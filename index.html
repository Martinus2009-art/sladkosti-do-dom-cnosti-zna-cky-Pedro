<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<title>Sladkosti do domácnosti</title>

<style>

body{
font-family:Arial;
background:#f6f6f6;
margin:0;
}

header{
background:#ff4081;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.topbar{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
padding:20px;
background:white;
}

input{
padding:10px;
font-size:16px;
width:250px;
}

select{
padding:10px;
font-size:16px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:contain;
}

.price{
color:#ff4081;
font-size:18px;
font-weight:bold;
margin-top:10px;
}

button{
background:#ff4081;
color:white;
border:none;
padding:10px 15px;
margin-top:10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#e73370;
}

.pagination{
text-align:center;
padding:20px;
}

.pagebtn{
padding:8px 12px;
margin:5px;
border:none;
background:#ddd;
cursor:pointer;
}

.pagebtn.active{
background:#ff4081;
color:white;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

</style>
</head>

<body>

<header>
Sladkosti do domácnosti 🍬
</header>

<div class="topbar">

<input id="search" placeholder="Vyhľadať sladkosti">

<select id="category">
<option value="">Všetky kategórie</option>
<option value="pedro">Pedro</option>
<option value="fini">Fini</option>
<option value="hors">Hors</option>
<option value="zele">Želé</option>
<option value="lizanky">Lízanky</option>
<option value="cokolada">Čokoláda</option>
<option value="zmesi">Zmesi</option>
</select>

</div>

<div class="products" id="products"></div>

<div class="pagination" id="pagination"></div>

<footer>

<p>Kontakt</p>

<p>Email: toblovaanna.praca@gmail.com</p>

<p>Tel: 0908068739</p>

<p>Facebook: Sladkosti do domácnosti</p>

</footer>

<script>

let products=[]
let filtered=[]
let currentPage=1
const perPage=20

fetch("products.json")
.then(res=>res.json())
.then(data=>{
products=data
filtered=data
render()
})

function render(){

const container=document.getElementById("products")
container.innerHTML=""

const start=(currentPage-1)*perPage
const pageProducts=filtered.slice(start,start+perPage)

pageProducts.forEach(p=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${p.images[0]}" loading="lazy">

<h3>${p.name.sk}</h3>

<div class="price">${p.priceEUR} €</div>

<a href="${p.url}" target="_blank">

<button>Detail produktu</button>

</a>

`

container.appendChild(card)

})

renderPagination()

}

function renderPagination(){

const pages=Math.ceil(filtered.length/perPage)

const pagination=document.getElementById("pagination")

pagination.innerHTML=""

for(let i=1;i<=pages;i++){

const btn=document.createElement("button")

btn.innerText=i

btn.className="pagebtn"

if(i===currentPage) btn.classList.add("active")

btn.onclick=()=>{

currentPage=i

render()

}

pagination.appendChild(btn)

}

}

document.getElementById("search").addEventListener("input",e=>{

const val=e.target.value.toLowerCase()

filtered=products.filter(p=>

p.name.sk.toLowerCase().includes(val)

)

currentPage=1

render()

})

document.getElementById("category").addEventListener("change",e=>{

const cat=e.target.value

if(cat===""){

filtered=products

}else{

filtered=products.filter(p=>p.cat.includes(cat))

}

currentPage=1

render()

})

</script>

</body>
</html>
