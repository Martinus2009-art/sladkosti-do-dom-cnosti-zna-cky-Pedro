<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sladkosti do domácnosti</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #fff7fb;
}

header {
  background: #ff4f93;
  color: white;
  text-align: center;
  padding: 30px;
}

.topbar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
}

input, textarea {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

.btn {
  background: #ff4f93;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.price {
  color: #ff4f93;
  font-weight: bold;
}

.pagination {
  text-align: center;
}

.pagebtn {
  margin: 3px;
  padding: 8px;
}

.order {
  background: white;
  max-width: 600px;
  margin: 30px auto;
  padding: 20px;
  border-radius: 12px;
}

footer {
  background: #2a1520;
  color: white;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
<h1>Sladkosti 🍬</h1>

<div class="topbar">
<input id="search" placeholder="Hľadať...">

<a class="btn" href="https://global.ceskecukrovinky.sk/katalog-2026-1/" target="_blank">
Katalóg
</a>
</div>
</header>

<div id="products" class="products"></div>
<div id="pagination" class="pagination"></div>

<!-- FORMULÁR -->
<div class="order">
<h2>Objednávka</h2>

<form id="form">
<input id="name" placeholder="Meno" required>
<input id="phone" placeholder="Telefón" required>
<textarea id="order" placeholder="Čo si želáte objednať?" required></textarea>
<button class="btn">Odoslať</button>
</form>
</div>

<footer>
<p>Email: toblovaanna.praca@gmail.com</p>
<p>Tel: 0908068739</p>
</footer>

<script>
let products = [];
let filtered = [];
let page = 1;
const perPage = 12;

fetch("products.json")
.then(r => r.json())
.then(data => {
  products = data;
  filtered = data;
  render();
});

document.getElementById("search").addEventListener("input", e => {
  const val = e.target.value.toLowerCase();
  filtered = products.filter(p =>
    (p.name?.sk || "").toLowerCase().includes(val)
  );
  page = 1;
  render();
});

function render() {
  const start = (page-1)*perPage;
  const list = filtered.slice(start, start+perPage);

  const el = document.getElementById("products");
  el.innerHTML = "";

  list.forEach(p => {
    el.innerHTML += `
      <div class="card">
        <img src="${p.images?.[0] || ""}" style="width:100%;height:200px;object-fit:contain">
        <h3>${p.name?.sk}</h3>
        <div class="price">${p.priceEUR} €</div>
      </div>
    `;
  });

  const pages = Math.ceil(filtered.length / perPage);
  const pag = document.getElementById("pagination");
  pag.innerHTML = "";

  for(let i=1;i<=pages;i++){
    pag.innerHTML += `<button class="pagebtn" onclick="go(${i})">${i}</button>`;
  }
}

function go(p){
  page = p;
  render();
}

// FORMULÁR → EMAIL
document.getElementById("form").addEventListener("submit", e => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const order = document.getElementById("order").value;

  const body = encodeURIComponent(
    "Meno: "+name+"\nTelefón: "+phone+"\n\nObjednávka:\n"+order
  );

  window.location.href =
    "mailto:toblovaanna.praca@gmail.com?subject=Objednávka&body=" + body;
});
</script>

</body>
</html>
