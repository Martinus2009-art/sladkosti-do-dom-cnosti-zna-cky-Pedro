<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sladkosti do domácnosti</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff7fb;
      color: #111;
    }

    header {
      background: #ff4f93;
      color: white;
      text-align: center;
      padding: 35px 20px;
    }

    header h1 {
      margin: 0 0 20px;
      font-size: 34px;
    }

    .topbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    input {
      padding: 13px;
      width: 90%;
      max-width: 420px;
      font-size: 15px;
    }

    .btn {
      background: #ff4f93;
      color: white;
      border: none;
      padding: 11px 16px;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }

    header .btn {
      background: white;
      color: #ff4f93;
      font-weight: bold;
    }

    .cat-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      padding: 18px;
      background: #fff;
    }

    .cat-btn {
      border: none;
      border-radius: 999px;
      padding: 9px 13px;
      background: #ffe1ee;
      cursor: pointer;
      color: #7a274c;
    }

    .cat-btn.active {
      background: #ff4f93;
      color: white;
    }

    .info {
      text-align: center;
      padding: 15px;
      font-size: 16px;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 22px;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      text-align: center;
      padding: 18px;
      box-shadow: 0 5px 18px rgba(0,0,0,.08);
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: contain;
      background: white;
    }

    .card h3 {
      min-height: 50px;
      font-size: 18px;
    }

    .cats {
      font-size: 12px;
      color: #777;
      min-height: 32px;
    }

    .price {
      color: #ff4f93;
      font-size: 22px;
      font-weight: bold;
      margin: 12px 0;
    }

    .pagination {
      text-align: center;
      padding: 25px 10px;
    }

    .pagebtn {
      margin: 4px;
      padding: 9px 13px;
      border: none;
      border-radius: 8px;
      background: #ffe1ee;
      cursor: pointer;
    }

    .pagebtn.active {
      background: #ff4f93;
      color: white;
    }

    footer {
      background: #2a1520;
      color: white;
      text-align: center;
      padding: 25px 15px;
      margin-top: 30px;
    }

    footer p {
      margin: 6px 0;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 26px;
      }

      .products {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Sladkosti do domácnosti 🍬</h1>

  <div class="topbar">
    <input id="search" type="text" placeholder="Vyhľadať produkt...">

    <!-- ✅ OPRAVENÝ LINK -->
    <a class="btn" href="https://global.ceskecukrovinky.sk/darkove-produkty/180-katalog-produktov.html" target="_blank">
      Otvoriť katalóg produktov
    </a>
  </div>
</header>

<div class="cat-buttons" id="categoryButtons"></div>

<div class="info" id="info">Načítavam produkty...</div>

<div class="products" id="products"></div>

<div class="pagination" id="pagination"></div>

<footer>
  <p><strong>Kontakt</strong></p>
  <p>Email: toblovaanna.praca@gmail.com</p>
  <p>Tel: 0908068739</p>
  <p>Facebook: Sladkosti do domácnosti</p>
</footer>

<script>
let products = [];
let filtered = [];
let selectedCategory = "";
let currentPage = 1;
const perPage = 16;

const productsEl = document.getElementById("products");
const searchEl = document.getElementById("search");
const categoryButtonsEl = document.getElementById("categoryButtons");
const infoEl = document.getElementById("info");
const paginationEl = document.getElementById("pagination");

fetch("products.json")
  .then(res => res.json())
  .then(data => {
    products = Array.isArray(data) ? data : [];
    filtered = [...products];
    createCategories();
    render();
  });

function formatCategoryName(cat) {
  return cat.replaceAll("_", " ");
}

function createCategories() {
  const set = new Set();

  products.forEach(p => {
    if (Array.isArray(p.cat)) {
      p.cat.forEach(c => set.add(c));
    }
  });

  categoryButtonsEl.innerHTML = "";

  const allBtn = document.createElement("button");
  allBtn.textContent = "Všetko";
  allBtn.className = "cat-btn active";
  allBtn.onclick = () => {
    selectedCategory = "";
    setActive(allBtn);
    applyFilters();
  };
  categoryButtonsEl.appendChild(allBtn);

  [...set].forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = formatCategoryName(cat);
    btn.className = "cat-btn";

    btn.onclick = () => {
      selectedCategory = cat;
      setActive(btn);
      applyFilters();
    };

    categoryButtonsEl.appendChild(btn);
  });
}

function setActive(btn) {
  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

function applyFilters() {
  const text = searchEl.value.toLowerCase();

  filtered = products.filter(p => {
    const name = (p.name?.sk || "").toLowerCase();
    const cats = p.cat || [];

    return (
      name.includes(text) &&
      (selectedCategory === "" || cats.includes(selectedCategory))
    );
  });

  currentPage = 1;
  render();
}

searchEl.addEventListener("input", applyFilters);

function render() {
  productsEl.innerHTML = "";

  const totalPages = Math.ceil(filtered.length / perPage);
  const start = (currentPage - 1) * perPage;
  const pageProducts = filtered.slice(start, start + perPage);

  pageProducts.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.images?.[0] || ""}">
      <h3>${p.name?.sk || ""}</h3>
      <div class="price">${p.priceEUR} €</div>
      <a href="${p.url}" target="_blank">
        <button class="btn">Detail produktu</button>
      </a>
    `;

    productsEl.appendChild(card);
  });

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  paginationEl.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement("button");
    btn.textContent = i;
    btn.className = "pagebtn";

    if (i === currentPage) btn.classList.add("active");

    btn.onclick = () => {
      currentPage = i;
      render();
    };

    paginationEl.appendChild(btn);
  }
}
</script>

</body>
</html>
